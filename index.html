<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Haus-Manager</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- Layout-Modal -->
<div id="layout-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;align-items:center;justify-content:center;padding:1rem">
    <div style="background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--rl);padding:1.25rem;width:100%;max-width:600px;max-height:80vh;overflow-y:auto">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
            <span style="font-size:16px;font-weight:500">Grundriss-Layout anpassen</span>
            <button class="icon-btn" onclick="document.getElementById('layout-modal').style.display='none'" aria-label="Schließen">
                <i class="ti ti-x"></i>
            </button>
        </div>
        <div id="layout-modal-body"></div>
    </div>
</div>

<div class="shell">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sb-head">
            <h1>
                <i class="ti ti-building" aria-hidden="true" style="font-size:18px"></i>
                <span id="sb-building-name">Mein Haus</span>
            </h1>
        </div>
        <nav class="sb-nav" id="sidebar-nav"></nav>
        <div class="sb-footer">
            <button onclick="showView('setup')" style="width:100%">
                <i class="ti ti-settings" aria-hidden="true"></i>Haus konfigurieren
            </button>
        </div>
    </aside>

    <!-- Main -->
    <main class="main" id="main-content">
        <div style="text-align:center;padding:4rem 1rem;color:var(--text2)">
            <i class="ti ti-building" style="font-size:48px;display:block;margin-bottom:1rem;color:var(--text3)"></i>
            <p>Konfiguriere zuerst dein Haus über den Button unten links.</p>
            <button onclick="showView('setup')" class="primary" style="margin-top:1rem">
                <i class="ti ti-settings"></i>Jetzt einrichten
            </button>
        </div>
    </main>
</div>

<script src="app.js"></script>
</body>
</html>
